# ==========================================
# GITHUB ACTIONS WORKFLOW CONFIGURATION
# ==========================================
name: Ray Cloud Distributed Build CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Authenticate with Ray Cloud
      run: npx ray login --token ${{ secrets.RAY_CLOUD_TOKEN }} --org my-org --project my-project
      env:
        RAY_CLOUD_TOKEN: ${{ secrets.RAY_CLOUD_TOKEN }}

    - name: Run Remote Distributed Build
      run: npx ray build --remote

    - name: Verify Ray Cloud cache health
      run: npx ray cloud doctor


